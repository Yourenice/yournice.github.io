<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ale Beer Collection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🍺 Ale Beer Finder</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
               
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search for a beer brand...">
            </div>
        </div>

        <div id="loader" class="text-center my-5">
            <div class="spinner-grow text-warning" role="status"></div>
            <p>Loading beers...</p>
        </div>

        <div id="beer-container" class="row g-4"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
